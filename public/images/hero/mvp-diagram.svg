<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #e2e8f0; stroke-width: 2; }
      .title { font: 700 28px system-ui, sans-serif; fill: #0f172a; }
      .sub { font: 500 16px system-ui, sans-serif; fill: #64748b; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .heading { font: 700 18px system-ui, sans-serif; fill: #0f172a; }
      .text { font: 500 14px system-ui, sans-serif; fill: #334155; }
      .arrow { stroke: #94a3b8; stroke-width: 3; fill: none; }
      .dot { fill: #f59e0b; }
    </style>

    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
            refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="800"/>

  <!-- Outer Card -->
  <rect class="panel" x="80" y="60" width="1040" height="680" rx="20"/>

  <!-- Title -->
  <text class="title" x="140" y="130">MVP Architecture Overview</text>
  <text class="sub" x="140" y="165">
    Lean, scalable foundation - build fast now, grow later.
  </text>

  <!-- Top Row -->
  <!-- Users -->
  <rect class="box" x="120" y="250" width="200" height="110" rx="16"/>
  <circle class="dot" cx="145" cy="285" r="6"/>
  <text class="heading" x="165" y="290">Users</text>
  <text class="text" x="165" y="320">Founder / Customers</text>

  <!-- Frontend -->
  <rect class="box" x="370" y="250" width="220" height="110" rx="16"/>
  <circle class="dot" cx="395" cy="285" r="6"/>
  <text class="heading" x="415" y="290">Frontend</text>
  <text class="text" x="415" y="320">Next.js / React</text>

  <!-- API -->
  <rect class="box" x="640" y="250" width="220" height="110" rx="16"/>
  <circle class="dot" cx="665" cy="285" r="6"/>
  <text class="heading" x="685" y="290">API</text>
  <text class="text" x="685" y="320">Node / Laravel</text>

  <!-- Database -->
  <rect class="box" x="900" y="250" width="180" height="110" rx="16"/>
  <circle class="dot" cx="920" cy="285" r="6"/>
  <text class="heading" x="940" y="290">Database</text>
  <text class="text" x="940" y="320">Postgres / MySQL</text>

  <!-- Arrows -->
  <line class="arrow" x1="320" y1="305" x2="370" y2="305" marker-end="url(#arrowhead)"/>
  <line class="arrow" x1="590" y1="305" x2="640" y2="305" marker-end="url(#arrowhead)"/>
  <line class="arrow" x1="860" y1="305" x2="900" y2="305" marker-end="url(#arrowhead)"/>

  <!-- Bottom Row -->
  <!-- Admin -->
  <rect class="box" x="240" y="450" width="300" height="140" rx="16"/>
  <text class="heading" x="300" y="495">Admin Dashboard</text>
  <text class="text" x="300" y="525">
    Manage users, content, settings
  </text>

  <!-- Analytics -->
 <rect class="box" x="630" y="450" width="300" height="140" rx="16"/>
<text class="heading" x="700" y="495">Analytics</text>
<text class="text" x="700" y="525">Track events &amp; conversions</text>
<text class="text" x="700" y="555">Measure growth decisions</text>

</svg>